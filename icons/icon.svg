<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#A29BFE"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book/Register icon -->
  <g transform="translate(256,240)" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Book -->
    <rect x="-100" y="-100" width="200" height="160" rx="12" fill="rgba(255,255,255,0.15)"/>
    <line x1="-100" y1="-40" x2="100" y2="-40"/>
    <!-- Yen sign -->
    <text x="0" y="15" font-family="sans-serif" font-size="80" font-weight="bold" fill="#fff" text-anchor="middle" stroke="none">¥</text>
    <!-- Coins -->
    <circle cx="80" cy="100" r="24" fill="rgba(255,255,255,0.25)" stroke="#fff" stroke-width="10"/>
    <circle cx="40" cy="110" r="20" fill="rgba(255,255,255,0.2)" stroke="#fff" stroke-width="8"/>
  </g>
</svg>
